name: Generate CyberMonitor Feeds

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */3 * * *"

permissions:
  contents: write

concurrency:
  group: generate-feeds
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install runtime dependencies (if present)
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install --no-fund --no-audit
          else
            echo "No npm dependencies declared; using built-in Node runtime."
          fi

      - name: Generate feeds
        run: node scripts/generate-feeds.js

      - name: Detect generated data changes
        id: changes
        run: |
          GENERATED_FILES=(
            "data/kev.json"
            "data/news.json"
            "data/outages.json"
            "data/feed-metadata.json"
            "data/feed-health.json"
            "data/map.correlated.json"
          )

          for file in "${GENERATED_FILES[@]}"; do
            if [ -f "$file" ]; then
              git add "$file"
            fi
          done

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No generated data changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Generated data changes detected."
          fi

      - name: Commit and push refreshed feeds
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: refresh generated intelligence feeds"
          git push
